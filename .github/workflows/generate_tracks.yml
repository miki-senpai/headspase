name: Generate tracks.json from Telegram

on:
  workflow_dispatch:  # Позволяет запускать вручную
  schedule:
    - cron: '0 0 * * *'  # Например, каждый день в полночь (UTC)

jobs:
  generate:
    runs-on: ubuntu-latest  # Ubuntu для окружения

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install telethon  # Устанавливаем telethon для работы с Telegram API

      - name: Generate tracks.json
        run: python scripts/generate_tracks.py  # Запуск скрипта
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}

      - name: List files in the current directory
        run: ls -alh  # Смотрим, что есть в директории

      - name: Upload tracks.json as artifact
        uses: actions/upload-artifact@v2  # Загрузка артефакта
        with:
          name: tracks
          path: tracks.json  # Убедись, что файл существует
