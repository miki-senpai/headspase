name: Generate Tracks

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generate_tracks.py
        id: generate
        run: python scripts/generate_tracks.py
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}

      - name: Check generated file
        run: |
          if [ ! -f tracks.json ]; then
            echo "Ошибка: файл tracks.json не был создан"
            exit 1
          fi
          echo "Файл tracks.json успешно создан"
          ls -alh tracks.json

      - name: Create GitHub Release
        if: success()
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: tracks.json
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Автоматически сгенерированный релиз
            - Дата: ${{ github.event.repository.updated_at }}
            - Номер сборки: ${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify about new release
        if: success()
        run: |
          echo "Релиз v${{ github.run_number }} успешно создан"
          echo "Файл tracks.json загружен в релиз"
